<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de gastos</title>
    <link rel="stylesheet" href="style.css">
    <script src="script3.js"></script>
</head>
<body>
    <main>
        <h1>Controle de gastos</h1>
        <form>
            <input id="valor" type="number" placeholder="Digite o valor do gasto">
            <select name="categoria" id="categoria">
                <option value="Alimentação">Alimentação</option>
                <option value="Transporte">Transporte</option>
                <option value="Lazer">Lazer</option>
                <option value="Outros">Outros</option>
            </select>
            <button  type="button"  onclick="adicionarGasto()">Adicionar</button>
        </form>
<div class="categorias">
            <div class="categoria"><p id="Alimentação">Alimentação: R$ 0,00</p></div>
            <div class="categoria"><p id="Transporte">Transporte: R$ 0,00</p></div>
            <div class="categoria"><p id="Lazer">Lazer: R$ 0,00</p></div>
            <div class="categoria"><p id="Outros">Outros: R$ 0,00</p></div>
            <div class="categoria total"><p id="Total">Total: R$ 0,00</p></div>
</div>
    </main>
    
</body>
</html>
